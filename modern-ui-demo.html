<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DACP - Modern Product Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glassmorphism {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .floating {
            animation: float 3s ease-in-out infinite;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Content will be loaded here -->
    </div>

    <script>
        // Simple vanilla JavaScript implementation
        let currentPage = 'auth';
        let isAuthenticated = false;
        let user = null;

        function render() {
            const app = document.getElementById('app');
            
            if (!isAuthenticated) {
                app.innerHTML = renderAuthPage();
            } else {
                app.innerHTML = renderMainApp();
            }
            
            attachEventListeners();
        }

        function renderAuthPage() {
            return `
                <div class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 flex items-center justify-center p-4">
                    <div class="absolute inset-0 overflow-hidden">
                        <div class="absolute -top-40 -right-40 w-80 h-80 bg-blue-500/20 rounded-full blur-3xl"></div>
                        <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-purple-500/20 rounded-full blur-3xl"></div>
                    </div>

                    <div class="w-full max-w-md relative">
                        <div class="text-center mb-8">
                            <div class="inline-flex p-4 bg-gradient-to-br from-blue-500 to-blue-700 rounded-2xl shadow-lg shadow-blue-500/30 mb-4 floating">
                                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                                </svg>
                            </div>
                            <h1 class="text-4xl font-bold text-white mb-2">DACP</h1>
                            <p class="text-slate-400">Product Scan & Inventory Management</p>
                        </div>

                        <div class="glassmorphism rounded-2xl p-6">
                            <div class="flex border-b border-white/10 mb-6">
                                <button onclick="setAuthMode('login')" id="loginTab" class="flex-1 py-4 font-medium transition-colors text-white border-b-2 border-blue-500">
                                    Sign In
                                </button>
                                <button onclick="setAuthMode('signup')" id="signupTab" class="flex-1 py-4 font-medium transition-colors text-slate-400 hover:text-white">
                                    Sign Up
                                </button>
                            </div>

                            <form onsubmit="handleAuth(event)" class="space-y-4">
                                <div id="nameField" class="hidden">
                                    <label class="block text-sm font-medium text-slate-300 mb-2">Name</label>
                                    <input type="text" id="nameInput" placeholder="Enter your name" class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-lg text-white placeholder-slate-500 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-slate-300 mb-2">Email</label>
                                    <input type="email" id="emailInput" placeholder="Enter your email" required class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-lg text-white placeholder-slate-500 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                                </div>

                                <div>
                                    <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                                    <input type="password" id="passwordInput" placeholder="Enter your password" required class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-lg text-white placeholder-slate-500 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors">
                                </div>

                                <div id="errorMessage" class="hidden bg-red-500/10 border border-red-500/20 text-red-400 px-4 py-3 rounded-lg text-sm"></div>

                                <button type="submit" class="w-full py-3 bg-gradient-to-r from-blue-500 to-blue-700 hover:from-blue-600 hover:to-blue-800 text-white rounded-lg font-medium transition-all shadow-lg shadow-blue-500/30 flex items-center justify-center gap-2">
                                    <span id="authButtonText">Sign In</span>
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path>
                                    </svg>
                                </button>
                            </form>

                            <div class="mt-6 text-center">
                                <p class="text-slate-400">
                                    <span id="authToggleText">Don't have an account?</span>
                                    <button onclick="toggleAuthMode()" class="ml-2 text-blue-400 hover:text-blue-300 font-medium">
                                        <span id="authToggleLink">Sign Up</span>
                                    </button>
                                </p>
                            </div>
                        </div>

                        <div class="flex justify-center gap-6 mt-8">
                            <div class="flex items-center gap-2 text-slate-400 text-sm">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path>
                                </svg>
                                <span>Smart Scanning</span>
                            </div>
                            <div class="flex items-center gap-2 text-slate-400 text-sm">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                                </svg>
                                <span>Secure Data</span>
                            </div>
                            <div class="flex items-center gap-2 text-slate-400 text-sm">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                                </svg>
                                <span>Fast Processing</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderMainApp() {
            return `
                <div class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-blue-50">
                    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-slate-200/50 shadow-lg">
                        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div class="flex items-center justify-between h-16">
                                <div class="flex items-center gap-3">
                                    <div class="p-2 bg-gradient-to-br from-blue-500 to-blue-700 rounded-xl shadow-lg">
                                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                                        </svg>
                                    </div>
                                    <span class="text-xl font-bold bg-gradient-to-r from-blue-600 to-blue-800 bg-clip-text text-transparent">
                                        DACP
                                    </span>
                                </div>
                                
                                <div class="hidden md:flex items-center gap-2">
                                    <button onclick="showPage('scanner')" id="scannerTab" class="flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition-all duration-200 bg-blue-600 text-white shadow-lg shadow-blue-600/30">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"></path>
                                        </svg>
                                        Scanner
                                    </button>
                                    <button onclick="showPage('data')" id="dataTab" class="flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition-all duration-200 text-slate-600 hover:bg-slate-100 hover:text-slate-900">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
                                        </svg>
                                        Product Data
                                    </button>
                                </div>
                                
                                <div class="hidden md:flex items-center gap-4">
                                    <div class="flex items-center gap-2 px-3 py-2 bg-slate-100 rounded-lg">
                                        <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                        </svg>
                                        <span class="text-sm font-medium text-slate-700">${user?.name || user?.email}</span>
                                    </div>
                                    <button onclick="logout()" class="flex items-center gap-2 px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg font-medium transition-colors shadow-lg shadow-red-500/30">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                                        </svg>
                                        Sign Out
                                    </button>
                                </div>
                            </div>
                        </div>
                    </nav>
                    
                    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        ${currentPage === 'scanner' ? renderScannerPage() : renderProductDataPage()}
                    </main>
                </div>
            `;
        }

        function renderScannerPage() {
            return `
                <div class="space-y-6">
                    <div class="text-center">
                        <h1 class="text-4xl font-black text-slate-900 mb-3">DACP PRODUCT SCANNER</h1>
                        <p class="text-lg text-slate-700 font-medium">Scan QR codes or create new products with our advanced system</p>
                    </div>

                    <div class="grid md:grid-cols-2 gap-8">
                        <div class="bg-white rounded-2xl p-8 shadow-xl hover:shadow-2xl transition-all duration-300 border border-slate-100">
                            <h2 class="text-2xl font-bold text-slate-900 mb-6 flex items-center gap-3">
                                <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                </svg>
                                SCAN PRODUCT
                            </h2>
                            
                            <!-- Camera Scanner Section -->
                            <div class="mb-6">
                                <div class="border-4 border-dashed border-blue-300 rounded-xl p-6 bg-blue-50/50 text-center">
                                    <div id="cameraContainer" class="mb-4">
                                        <video id="cameraVideo" class="w-full h-64 bg-black rounded-lg hidden"></video>
                                        <div id="cameraPlaceholder" class="h-64 bg-gradient-to-br from-blue-100 to-blue-200 rounded-lg flex items-center justify-center">
                                            <div class="text-center">
                                                <svg class="w-16 h-16 text-blue-600 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                                </svg>
                                                <p class="text-blue-700 font-medium">Camera Scanner</p>
                                                <p class="text-blue-600 text-sm mt-1">Click below to start camera</p>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div class="flex gap-3">
                                        <button onclick="startCamera()" id="startCameraBtn" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg transition-all flex items-center justify-center gap-2 shadow-lg">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                                            </svg>
                                            Start Camera
                                        </button>
                                        <button onclick="stopCamera()" id="stopCameraBtn" class="flex-1 bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg transition-all flex items-center justify-center gap-2 shadow-lg hidden">
                                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                                            </svg>
                                            Stop Camera
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <!-- Manual Entry Section -->
                            <div class="space-y-4">
                                <h3 class="text-lg font-semibold text-slate-800 mb-3">OR ENTER PRODUCT ID MANUALLY</h3>
                                <div>
                                    <label class="block text-sm font-bold text-slate-700 mb-2">Product ID</label>
                                    <input type="text" id="scanProductId" placeholder="Enter product ID (e.g., PRD001)" class="w-full px-4 py-3 border-2 border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-lg">
                                </div>
                                <button onclick="scanProduct()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition-all flex items-center justify-center gap-2 shadow-lg">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                                    </svg>
                                    SEARCH PRODUCT
                                </button>
                            </div>
                        </div>

                        <div class="bg-white rounded-2xl p-8 shadow-xl hover:shadow-2xl transition-all duration-300 border border-slate-100">
                            <h2 class="text-2xl font-bold text-slate-900 mb-6 flex items-center gap-3">
                                <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                                </svg>
                                CREATE NEW PRODUCT
                            </h2>
                            <div class="space-y-5">
                                <div>
                                    <label class="block text-sm font-bold text-slate-700 mb-2">Product Name</label>
                                    <input type="text" id="productName" placeholder="Enter product name" class="w-full px-4 py-3 border-2 border-slate-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 text-lg">
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-sm font-bold text-slate-700 mb-2">Price ($)</label>
                                        <input type="number" id="productPrice" placeholder="0.00" step="0.01" class="w-full px-4 py-3 border-2 border-slate-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 text-lg">
                                    </div>
                                    <div>
                                        <label class="block text-sm font-bold text-slate-700 mb-2">Stock Quantity</label>
                                        <input type="number" id="productStock" placeholder="0" class="w-full px-4 py-3 border-2 border-slate-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 text-lg">
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-slate-700 mb-2">Warehouse Location</label>
                                    <input type="text" id="productWarehouse" placeholder="Enter warehouse location" class="w-full px-4 py-3 border-2 border-slate-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 text-lg">
                                </div>
                                <div>
                                    <label class="block text-sm font-bold text-slate-700 mb-2">Supplier Name</label>
                                    <input type="text" id="productSupplier" placeholder="Enter supplier name" class="w-full px-4 py-3 border-2 border-slate-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 text-lg">
                                </div>
                                <button onclick="createProduct()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-6 rounded-lg transition-all flex items-center justify-center gap-2 shadow-lg text-lg">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                                    </svg>
                                    CREATE PRODUCT
                                </button>
                            </div>
                        </div>
                    </div>

                    <div id="scanResult" class="hidden bg-white rounded-2xl p-8 shadow-xl border border-green-200">
                        <h2 class="text-2xl font-bold text-slate-900 mb-6 flex items-center gap-3">
                            <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                            SCANNED PRODUCT DETAILS
                        </h2>
                        <div id="scanResultContent"></div>
                    </div>
                </div>
            `;
        }

        function renderProductDataPage() {
            return `
                <div class="space-y-6">
                    <div class="text-center">
                        <h1 class="text-4xl font-black text-slate-900 mb-3">DACP PRODUCT DATABASE</h1>
                        <p class="text-lg text-slate-700 font-medium">Manage and monitor your complete inventory system</p>
                    </div>

                    <div class="bg-white rounded-2xl p-8 shadow-xl border border-slate-100">
                        <div class="flex items-center justify-between mb-8">
                            <h2 class="text-2xl font-bold text-slate-900 flex items-center gap-3">
                                <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"></path>
                                </svg>
                                COMPLETE INVENTORY OVERVIEW
                            </h2>
                            <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition-all flex items-center gap-2 shadow-lg">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                                </svg>
                                EXPORT TO CSV
                            </button>
                        </div>

                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead>
                                    <tr class="border-b border-slate-200">
                                        <th class="text-left py-3 px-4 font-medium text-slate-700">Product ID</th>
                                        <th class="text-left py-3 px-4 font-medium text-slate-700">Name</th>
                                        <th class="text-left py-3 px-4 font-medium text-slate-700">Price</th>
                                        <th class="text-left py-3 px-4 font-medium text-slate-700">Stock</th>
                                        <th class="text-left py-3 px-4 font-medium text-slate-700">Warehouse</th>
                                        <th class="text-left py-3 px-4 font-medium text-slate-700">Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr class="border-b border-slate-100 hover:bg-slate-50 bg-white">
                                        <td class="py-3 px-4 font-medium text-slate-800">PRD001</td>
                                        <td class="py-3 px-4 text-slate-700">Laptop Pro</td>
                                        <td class="py-3 px-4 text-slate-700">$1299.99</td>
                                        <td class="py-3 px-4">
                                            <span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800">
                                                25 units
                                            </span>
                                        </td>
                                        <td class="py-3 px-4 text-slate-700">Main Warehouse</td>
                                        <td class="py-3 px-4">
                                            <span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800">
                                                In Stock
                                            </span>
                                        </td>
                                    </tr>
                                    <tr class="border-b border-slate-100 hover:bg-slate-50 bg-slate-50/50">
                                        <td class="py-3 px-4 font-medium text-slate-800">PRD002</td>
                                        <td class="py-3 px-4 text-slate-700">Wireless Mouse</td>
                                        <td class="py-3 px-4 text-slate-700">$49.99</td>
                                        <td class="py-3 px-4">
                                            <span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800">
                                                150 units
                                            </span>
                                        </td>
                                        <td class="py-3 px-4 text-slate-700">North Warehouse</td>
                                        <td class="py-3 px-4">
                                            <span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800">

                                                8 units

                                        </td>
                                        <td class="py-3 px-4 text-slate-700">Main Warehouse</td>
                                        <td class="py-3 px-4">
                                            <span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800">
                                                In Stock
                                            </span>
                                        </td>
                                    </tr>
                                    <tr class="border-b border-slate-100 hover:bg-slate-50 bg-slate-50/50">
                                        <td class="py-3 px-4 font-medium text-slate-800">PRD004</td>
                                        <td class="py-3 px-4 text-slate-700">Mechanical Keyboard</td>

        function attachEventListeners() {
            // Event listeners are attached via onclick attributes
        }

        function setAuthMode(mode) {
            const loginTab = document.getElementById('loginTab');
            const signupTab = document.getElementById('signupTab');
            const nameField = document.getElementById('nameField');
            const authButtonText = document.getElementById('authButtonText');
            const authToggleText = document.getElementById('authToggleText');
            const authToggleLink = document.getElementById('authToggleLink');

            if (mode === 'login') {
                loginTab.className = 'flex-1 py-4 font-medium transition-colors text-white border-b-2 border-blue-500';
                signupTab.className = 'flex-1 py-4 font-medium transition-colors text-slate-400 hover:text-white';
                nameField.className = 'hidden';
                authButtonText.textContent = 'Sign In';
                authToggleText.textContent = "Don't have an account?";
                authToggleLink.textContent = 'Sign Up';
            } else {
                signupTab.className = 'flex-1 py-4 font-medium transition-colors text-white border-b-2 border-blue-500';
                loginTab.className = 'flex-1 py-4 font-medium transition-colors text-slate-400 hover:text-white';
                nameField.className = nameField.className.replace('hidden', '');
                authButtonText.textContent = 'Create Account';
                authToggleText.textContent = "Already have an account?";
                authToggleLink.textContent = 'Sign In';
            }
        }

        function toggleAuthMode() {
            const loginTab = document.getElementById('loginTab');
            if (loginTab.className.includes('border-blue-500')) {
                setAuthMode('signup');
            } else {
                setAuthMode('login');
            }
        }

        function handleAuth(event) {
            event.preventDefault();
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const name = document.getElementById('nameInput').value;

            if (email && password) {
                user = {
                    name: name || email.split('@')[0],
                    email: email,
                    isAdmin: email.includes('admin')
                };
                isAuthenticated = true;
                render();
            } else {
                const errorDiv = document.getElementById('errorMessage');
                errorDiv.textContent = 'Please enter email and password';
                errorDiv.className = errorDiv.className.replace('hidden', '');
            }
        }

        function logout() {
            isAuthenticated = false;
            user = null;
            render();
        }

        function showPage(page) {
            currentPage = page;
            const scannerTab = document.getElementById('scannerTab');
            const dataTab = document.getElementById('dataTab');

            if (page === 'scanner') {
                scannerTab.className = 'flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition-all duration-200 bg-blue-600 text-white shadow-lg shadow-blue-600/30';
                dataTab.className = 'flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition-all duration-200 text-slate-600 hover:bg-slate-100 hover:text-slate-900';
            } else {
                dataTab.className = 'flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition-all duration-200 bg-blue-600 text-white shadow-lg shadow-blue-600/30';
                scannerTab.className = 'flex items-center gap-2 px-4 py-2 rounded-lg font-medium transition-all duration-200 text-slate-600 hover:bg-slate-100 hover:text-slate-900';
            }

            render();
        }

        let cameraStream = null;
        let isScanning = false;

        async function startCamera() {
            const video = document.getElementById('cameraVideo');
            const placeholder = document.getElementById('cameraPlaceholder');
            const startBtn = document.getElementById('startCameraBtn');
            const stopBtn = document.getElementById('stopCameraBtn');

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                
                cameraStream = stream;
                video.srcObject = stream;
                video.className = 'w-full h-64 bg-black rounded-lg';
                placeholder.className = 'hidden';
                startBtn.className = 'hidden';
                stopBtn.className = 'flex-1 bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-lg transition-all flex items-center justify-center gap-2 shadow-lg';
                
                // Simulate QR code scanning
                setTimeout(() => {
                    if (cameraStream) {
                        simulateQRScan();
                    }
                }, 3000);
                
            } catch (error) {
                alert('Camera access denied or not available. Please use manual entry.');
            }
        }

        function stopCamera() {
            const video = document.getElementById('cameraVideo');
            const placeholder = document.getElementById('cameraPlaceholder');
            const startBtn = document.getElementById('startCameraBtn');
            const stopBtn = document.getElementById('stopCameraBtn');

            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
                cameraStream = null;
            }
            
            video.srcObject = null;
            video.className = 'w-full h-64 bg-black rounded-lg hidden';
            placeholder.className = 'h-64 bg-gradient-to-br from-blue-100 to-blue-200 rounded-lg flex items-center justify-center';
            startBtn.className = 'flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg transition-all flex items-center justify-center gap-2 shadow-lg';
            stopBtn.className = 'hidden';
        }

        function simulateQRScan() {
            const productId = 'QR' + Math.floor(Math.random() * 1000);
            document.getElementById('scanProductId').value = productId;
            scanProduct();
            stopCamera();
        }

        function scanProduct() {
            const productId = document.getElementById('scanProductId').value;
            if (!productId) {
                alert('Please enter a product ID');
                return;
            }

            const resultDiv = document.getElementById('scanResult');
            const contentDiv = document.getElementById('scanResultContent');
            
            resultDiv.className = 'bg-white rounded-2xl p-8 shadow-xl border border-green-200';
            contentDiv.innerHTML = `
                <div class="grid md:grid-cols-2 gap-6">
                    <div class="bg-slate-50 p-4 rounded-lg">
                        <p class="text-sm font-bold text-slate-600 mb-1">PRODUCT ID</p>
                        <p class="text-xl font-black text-slate-900">${productId}</p>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-lg">
                        <p class="text-sm font-bold text-slate-600 mb-1">PRODUCT NAME</p>
                        <p class="text-xl font-black text-slate-900">Product ${productId}</p>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-lg">
                        <p class="text-sm font-bold text-slate-600 mb-1">PRICE</p>
                        <p class="text-xl font-black text-green-600">$${(Math.random() * 1000 + 50).toFixed(2)}</p>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-lg">
                        <p class="text-sm font-bold text-slate-600 mb-1">STOCK LEVEL</p>
                        <p class="text-xl font-black text-slate-900">${Math.floor(Math.random() * 200)} units</p>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-lg">
                        <p class="text-sm font-bold text-slate-600 mb-1">WAREHOUSE</p>
                        <p class="text-xl font-black text-slate-900">Main Warehouse</p>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-lg">
                        <p class="text-sm font-bold text-slate-600 mb-1">LAST SCANNED</p>
                        <p class="text-xl font-black text-blue-600">${new Date().toLocaleString()}</p>
                    </div>
                </div>
                <div class="mt-6 p-4 bg-green-50 border border-green-200 rounded-lg">
                    <p class="text-green-800 font-bold text-center">✅ Product successfully scanned and logged!</p>
                </div>
            `;
        }

        function createProduct() {
            const name = document.getElementById('productName').value;
            const price = document.getElementById('productPrice').value;
            const stock = document.getElementById('productStock').value;
            const warehouse = document.getElementById('productWarehouse').value;
            const supplier = document.getElementById('productSupplier').value;

            if (!name || !price || !stock) {
                alert('Please fill all required fields');
                return;
            }

            alert(`✅ Product "${name}" created successfully!\n\nPrice: $${price}\nStock: ${stock} units\nWarehouse: ${warehouse}\nSupplier: ${supplier || 'Not specified'}`);
            
            // Clear form
            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productStock').value = '';
            document.getElementById('productWarehouse').value = '';
            document.getElementById('productSupplier').value = '';
        }

        // Initialize the app
        render();
    </script>
</body>
