services:
  - type: web
    name: dacp-frontend
    env: static
    buildCommand: npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 18
    routes:
      - type: rewrite
        source: /api/(.*)
        destination: https://dacp-backend.onrender.com/api/$1
      - type: rewrite
        source: /.*
        destination: /index.html
