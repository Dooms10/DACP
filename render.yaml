services:
  - type: web
    name: dacp-app
    env: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run server
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATA_DIR
        value: /opt/render/project/src/server-data
    disk:
      name: dacp-data
      mountPath: /opt/render/project/src/server-data
      sizeGB: 1
